name: E-Wallet CI

on:
  pull_request:
    branches:
      - master
      - develop
  push:
    branches:
      - master
      - develop

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build all modules
        run: mvn clean install

      - name: Run tests
        run: mvn test

      - name: Build Gateway Docker image
        run: docker build -t ewallet-gateway:latest ./ewallet-gateway

      - name: Build User Service Docker image
        run: docker build -t ewallet-user:latest ./ewallet-user

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Gateway image
        run: |
          docker tag ewallet-gateway:latest ${{ secrets.DOCKER_USERNAME }}/ewallet-gateway:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/ewallet-gateway:latest